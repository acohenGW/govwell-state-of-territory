<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>
(function(){
  const k='gw_auth';
  if(sessionStorage.getItem(k)!=='ok'){
    let pw=prompt('Enter password to access GovWell Territory Dashboard:');
    if(pw!=='Permitplease'){
      document.write('<div style="font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;background:#080808;color:#e2e8f0;font-size:18px">Access denied.</div>');
      throw new Error('Access denied');
    }
    sessionStorage.setItem(k,'ok');
  }
})();
</script>

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#080808;color:#e2e8f0;height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* ── Header ─────────────────────────────────────────────── */
#header{display:flex;align-items:center;justify-content:space-between;padding:0 14px;height:46px;background:#0f0f0f;border-bottom:1px solid #222;flex-shrink:0;gap:10px}

.subtitle{font-size:10px;color:#444;white-space:nowrap;padding-left:10px;border-left:1px solid #222}
.date-chip{font-size:9px;padding:2px 7px;border-radius:10px;background:#1a1a1a;border:1px solid #333;color:#888;white-space:nowrap}
.header-left{display:flex;align-items:center;gap:10px}

/* ── BDR Pills ──────────────────────────────────────────── */
.bdr-row{display:flex;align-items:center;gap:4px;flex-wrap:nowrap}
.pill-lbl{font-size:9px;color:#444;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;padding-right:2px}
.bdr-pill{font-size:10px;padding:3px 8px;border-radius:20px;border:1px solid #222;cursor:pointer;color:#555;background:transparent;transition:all .12s;white-space:nowrap;font-weight:500;font-family:inherit}
.bdr-pill:hover{color:#e2e8f0;border-color:#444}
.bdr-pill.active{background:#1a3060;border-color:#3b82f6;color:#60a5fa;font-weight:600}

/* ── Body ───────────────────────────────────────────────── */
#body{display:flex;flex:1;overflow:hidden}
#mapWrap{flex:1;position:relative;overflow:hidden;background:#080808}
svg#map{width:100%;height:100%;cursor:grab}
svg#map:active{cursor:grabbing}

/* ── State paths — PURE NEUTRAL GRAY for max dot contrast ── */
/* States use ONLY gray tones so every colored dot pops */
.state-path{stroke:#111;stroke-width:0.8;cursor:pointer;transition:filter .12s}
.state-path:hover{filter:brightness(1.7)}
.state-path.selected{stroke:#fff;stroke-width:1.5;filter:brightness(1.3)}
.state-label{font-family:'Inter',sans-serif;font-weight:700;pointer-events:none;text-anchor:middle;dominant-baseline:middle;fill:rgba(255,255,255,0.45)}

/* ── Dots ───────────────────────────────────────────────── */
.dot{cursor:pointer;transition:filter .1s}
.dot:hover{filter:brightness(1.6) drop-shadow(0 0 4px white)}
.dot.dimmed{opacity:.08}

/* ── Dot labels (deep zoom) ─────────────────────────────── */
.dot-label{font-family:'Inter',sans-serif;font-size:8px;pointer-events:none;dominant-baseline:middle}

/* ── Back / zoom controls ───────────────────────────────── */
#backBtn{position:absolute;top:10px;left:10px;background:#111;border:1px solid #444;border-radius:7px;color:#ccc;font-size:11px;font-weight:600;padding:5px 12px;cursor:pointer;display:none;z-index:10;font-family:inherit;transition:all .12s}
#backBtn.visible{display:block}
#backBtn:hover{background:#222;color:#fff;border-color:#888}
#zoomCtrls{position:absolute;bottom:14px;left:14px;display:flex;flex-direction:column;gap:3px;z-index:5}
#zoomCtrls button{width:28px;height:28px;background:#111;border:1px solid #333;border-radius:6px;color:#888;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;line-height:1;transition:all .12s}
#zoomCtrls button:hover{background:#333;color:#fff}

/* ── Dot filter toggle — VIVID for usability ────────────── */

.dt-btn:hover{color:#ddd;background:#1e1e1e}
/* All active */
.dt-btn.active-all{background:#2a2a2a;color:#fff}

/* Pipeline active: muted gold */
.dt-btn.active-pipeline{background:#92400e;color:#fed7aa;box-shadow:0 0 12px rgba(251,146,60,.3)}

.dt-btn.active-touched{background:#0369a1;color:#fff;box-shadow:0 0 12px rgba(56,189,248,.5)}
